name: "Security & Linting"

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.sh'
      - '**/*.tpl'
      - '**/*.yml'
      - '**/*.yaml'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.sh'
      - '**/*.tpl'
      - '**/*.yml'
      - '**/*.yaml'
      - '.github/workflows/**'

jobs:
  shellcheck:
    name: ShellCheck (Bash Linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: 'cache output docs .git'
          severity: 'style'          # error, warning, info, style
          format: 'tty'
        env:
          SHELLCHECK_OPTS: "-e SC1091 -e SC1090"  # Ignore source file not found

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    strategy:
      matrix:
        language: ['javascript-typescript', 'actions']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # queries: security-extended   # uncomment jika mau lebih strict

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
